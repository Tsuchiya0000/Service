<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>HowTo - 創作支援ツール</title>
    <link rel="stylesheet" href="css/HowTo.css">

</head>

<body>

<h1>使い方</h1>

<div class="howtoContainer">
    <!-- パレットノート -->
    <div class="howtoCard">
        <h2>パレットノート</h2>
        <p>色を登録して保存できます。保存したパレットはホームで一覧表示されます。</p>
    </div>

    <!-- 作成 -->
    <div class="howtoCard">
        <h2>作成</h2>
        <p>新しいパレットを作成できます。色は4色まで登録可能です。</p>
    </div>

    <!-- お題ジェネレーター -->
    <div class="howtoCard">
        <h2>お題ジェネレーター</h2>
        <p>ランダムにお題を生成できます。お題は保存・共有可能です。</p>
    </div>

    <!-- インポート / エクスポート -->
    <div class="howtoCard">
        <h2>インポート / エクスポート</h2>
        <p>JSON形式でパレットを保存・共有できます。</p>
    </div>

    <!-- ダークモード -->
    <div class="howtoCard">
        <h2>ダークモード</h2>
        <p>画面のテーマを切り替えできます。設定は保存されます。</p>
    </div>

</div>

<!-- ホームへ戻るボタン -->
<button onclick="location.href='Home.html'">ホームへ戻る</button>

</body>
</html>
